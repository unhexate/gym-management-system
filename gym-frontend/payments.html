<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payments – GymMS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<nav></nav>

<div class="page">
  <h1>Payments</h1>

  <!-- Process payment -->
  <div class="card" id="paymentCard">
    <h2 id="paymentTitle">Process a Payment</h2>
    <form id="paymentForm">
      <div class="form-grid">
        <div class="form-group" id="memberIdGroup">
          <label for="memberSelect">Member</label>
          <select id="memberSelect" required>
            <option value="">Select member…</option>
          </select>
        </div>
        <div class="form-group">
          <label for="membershipRef">Active Membership</label>
          <input id="membershipRef" type="text" placeholder="Select a member first" readonly />
        </div>
        <div class="form-group">
          <label for="amount">Amount (₹)</label>
          <input id="amount" type="number" step="0.01" placeholder="999.00" required />
        </div>
        <div class="form-group">
          <label for="paymentMode">Payment Mode</label>
          <select id="paymentMode" required>
            <option value="">Select…</option>
            <option value="CASH">Cash</option>
            <option value="CARD">Card</option>
            <option value="ONLINE">Online</option>
          </select>
        </div>
      </div>
      <br />
      <button id="paymentSubmitBtn" type="submit" class="btn btn-success">Process Payment</button>
    </form>
  </div>

  <div class="card" id="pendingCard" style="display:none;">
    <h2>Pending Payment Requests</h2>
    <button id="loadPendingBtn" class="btn btn-secondary">Load Pending Requests</button>
    <br /><br />
    <div class="table-wrap" id="pendingWrap" style="display:none;">
      <table>
        <thead>
          <tr><th>ID</th><th>Member</th><th>Membership</th><th>Amount</th><th>Mode</th><th>Status</th><th>Action</th></tr>
        </thead>
        <tbody id="pendingBody"></tbody>
      </table>
    </div>
    <p id="pendingEmpty" class="empty" style="display:none;">No pending payment requests.</p>
  </div>

  <!-- Payment history -->
  <div class="card">
    <h2>Payment History</h2>
    <div class="row">
      <div class="form-group" style="flex:1;min-width:140px;">
        <label for="historyMemberSelect">Member</label>
        <select id="historyMemberSelect">
          <option value="">Select member…</option>
        </select>
      </div>
      <button id="historyBtn" class="btn btn-secondary">Load History</button>
    </div>
    <br />
    <div class="table-wrap" id="historyWrap" style="display:none;">
      <table>
        <thead>
          <tr><th>ID</th><th>Amount</th><th>Mode</th><th>Date</th><th>Membership ID</th></tr>
        </thead>
        <tbody id="historyBody"></tbody>
      </table>
    </div>
    <p id="historyEmpty" class="empty" style="display:none;">No payments found for this member.</p>
  </div>
</div>

<div id="toast"></div>
<script src="auth.js"></script>
<script src="api.js"></script>
<script>
  const session = requireRole(['ADMIN', 'RECEPTIONIST', 'MEMBER']);
  if (!session) throw new Error('redirect');

  const canProcessPayment = hasAnyRole(['ADMIN', 'RECEPTIONIST']);
  const isMember = session.role === 'MEMBER';
  const memberSelect = document.getElementById('memberSelect');
  const historyMemberSelect = document.getElementById('historyMemberSelect');
  const membershipRef = document.getElementById('membershipRef');
  let resolvedMembershipId = null;
  document.getElementById('paymentCard').style.display = canProcessPayment ? '' : 'none';
  document.getElementById('pendingCard').style.display = canProcessPayment ? '' : 'none';

  async function initMemberSelectors() {
    const members = await searchUsers({ role: 'MEMBER', limit: 50 });
    const options = ['<option value="">Select member…</option>'];
    members.forEach(member => {
      options.push(`<option value="${member.id}">${member.name} (${member.email})</option>`);
    });
    memberSelect.innerHTML = options.join('');
    historyMemberSelect.innerHTML = options.join('');
  }

  async function resolveActiveMembership(memberId) {
    if (!memberId) {
      resolvedMembershipId = null;
      membershipRef.value = '';
      return;
    }

    try {
      const membership = await getMembership(memberId);
      resolvedMembershipId = membership.id;
      membershipRef.value = `#${membership.id} - ${membership.plan?.planName || 'Plan'}`;
      if (membership.price != null) {
        document.getElementById('amount').value = membership.price;
      }
    } catch (err) {
      resolvedMembershipId = null;
      membershipRef.value = 'No active membership';
      throw err;
    }
  }

  memberSelect.addEventListener('change', async () => {
    try {
      await resolveActiveMembership(memberSelect.value);
    } catch (err) {
      toast(err.message, 'err');
    }
  });

  document.getElementById('paymentForm').addEventListener('submit', async e => {
    e.preventDefault();
    try {
      const memberId = +memberSelect.value;
      if (!memberId) return toast('Select a member', 'err');
      if (!resolvedMembershipId) return toast('No active membership found for selected member', 'err');

      const data = await processPayment({
        memberId,
        membershipId: resolvedMembershipId,
        amount:       +document.getElementById('amount').value,
        paymentMode:   document.getElementById('paymentMode').value,
      });
      toast(`Payment recorded (ID: ${data.id})`);
      e.target.reset();
      resolvedMembershipId = null;
      membershipRef.value = '';
    } catch (err) { toast(err.message, 'err'); }
  });

  document.getElementById('historyBtn').addEventListener('click', async () => {
    const id = historyMemberSelect.value;
    if (!isMember && !id) return toast('Select a member', 'err');
    try {
      const list = isMember ? await getMyPayments() : await getPayments(id);
      const wrap  = document.getElementById('historyWrap');
      const empty = document.getElementById('historyEmpty');
      if (!list || list.length === 0) { wrap.style.display = 'none'; empty.style.display = ''; return; }
      document.getElementById('historyBody').innerHTML = list.map(p => `
        <tr>
          <td>${p.id}</td>
          <td>₹${p.amount}</td>
          <td><span class="badge badge-blue">${p.paymentMode}</span></td>
          <td>${p.date ?? '—'}</td>
          <td>${p.membership?.id ?? '—'}</td>
        </tr>`).join('');
      wrap.style.display = '';
      empty.style.display = 'none';
    } catch (err) {
      document.getElementById('historyWrap').style.display = 'none';
      document.getElementById('historyEmpty').style.display = '';
      toast(err.message, 'err');
    }
  });

  if (session.role === 'MEMBER') {
    const memberIdGroup = historyMemberSelect.closest('.form-group');
    if (memberIdGroup) memberIdGroup.style.display = 'none';
    document.getElementById('historyBtn').textContent = 'Load My History';
    document.getElementById('historyBtn').click();
  }

  if (canProcessPayment) {
    initMemberSelectors().catch(err => toast(err.message || 'Unable to load members', 'err'));
  }

  async function loadPending() {
    try {
      const list = await getPendingPayments();
      const wrap = document.getElementById('pendingWrap');
      const empty = document.getElementById('pendingEmpty');
      if (!list || list.length === 0) { wrap.style.display = 'none'; empty.style.display = ''; return; }
      document.getElementById('pendingBody').innerHTML = list.map(p => `
        <tr>
          <td>${p.id}</td>
          <td>${p.member?.id ?? '—'}</td>
          <td>${p.membership?.id ?? '—'}</td>
          <td>₹${p.amount}</td>
          <td><span class="badge badge-blue">${p.paymentMode}</span></td>
          <td><span class="badge badge-yellow">${p.paymentStatus}</span></td>
          <td>
            <button class="btn btn-success" data-id="${p.id}" data-status="SUCCESS">Approve</button>
            <button class="btn btn-danger" data-id="${p.id}" data-status="FAILED">Reject</button>
          </td>
        </tr>`).join('');
      wrap.style.display = '';
      empty.style.display = 'none';
    } catch (err) {
      toast(err.message, 'err');
    }
  }

  document.getElementById('loadPendingBtn').addEventListener('click', loadPending);

  document.getElementById('pendingBody').addEventListener('click', async e => {
    const btn = e.target.closest('button[data-id]');
    if (!btn) return;
    try {
      await updatePaymentStatus(btn.dataset.id, btn.dataset.status);
      toast('Payment status updated');
      await loadPending();
    } catch (err) {
      toast(err.message, 'err');
    }
  });

  if (canProcessPayment) {
    loadPending();
  }
</script>
</body>
</html>
