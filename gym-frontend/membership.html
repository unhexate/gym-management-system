<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Membership – GymMS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<nav></nav>

<div class="page">
  <h1>Membership</h1>

  <!-- Enroll -->
  <div class="card" id="enrollCard">
    <h2 id="enrollTitle">Enroll in a Plan</h2>
    <form id="enrollForm">
      <div class="form-grid">
        <div class="form-group" id="memberIdGroup">
          <label for="memberSelect">Member</label>
          <select id="memberSelect" required>
            <option value="">Select member…</option>
          </select>
        </div>
        <div class="form-group">
          <label for="planSelect">Plan</label>
          <select id="planSelect" required>
            <option value="">Select plan…</option>
          </select>
        </div>
        <div class="form-group" id="paymentModeGroup" style="display:none;">
          <label for="membershipPaymentMode">Payment Mode</label>
          <select id="membershipPaymentMode">
            <option value="ONLINE">Online</option>
            <option value="CARD">Card</option>
            <option value="CASH">Cash</option>
          </select>
        </div>
      </div>
      <br />
      <button id="enrollBtn" type="submit" class="btn btn-primary">Enroll</button>
    </form>
  </div>

  <!-- View membership -->
  <div class="card">
    <h2>View Active Membership</h2>
    <div class="row">
      <div class="form-group" style="flex:1;min-width:140px;">
        <label for="lookupMemberSelect">Member</label>
        <select id="lookupMemberSelect">
          <option value="">Select member…</option>
        </select>
      </div>
      <button id="lookupBtn" class="btn btn-secondary">Look Up</button>
    </div>
    <br />
    <div id="membershipInfo" style="display:none;">
      <table>
        <thead><tr><th>Field</th><th>Value</th></tr></thead>
        <tbody id="membershipBody"></tbody>
      </table>
    </div>
    <p id="membershipEmpty" class="empty" style="display:none;">No active membership found for this member.</p>
  </div>
</div>

<div id="toast"></div>
<script src="auth.js"></script>
<script src="api.js"></script>
<script>
  const session = requireRole(['ADMIN', 'RECEPTIONIST', 'TRAINER', 'MEMBER']);
  if (!session) throw new Error('redirect');

  const canEnrollMembership = hasAnyRole(['ADMIN', 'RECEPTIONIST', 'MEMBER']);
  const isMember = session.role === 'MEMBER';
  const memberSelect = document.getElementById('memberSelect');
  const lookupMemberSelect = document.getElementById('lookupMemberSelect');
  const planSelect = document.getElementById('planSelect');
  document.getElementById('enrollCard').style.display = canEnrollMembership ? '' : 'none';

  if (isMember) {
    document.getElementById('enrollTitle').textContent = 'Buy a Membership Plan';
    document.getElementById('enrollBtn').textContent = 'Buy Membership';
    const memberIdGroup = document.getElementById('memberIdGroup');
    if (memberIdGroup) memberIdGroup.style.display = 'none';
    const paymentModeGroup = document.getElementById('paymentModeGroup');
    if (paymentModeGroup) paymentModeGroup.style.display = '';
    memberSelect.required = false;
  }

  async function loadPlanOptions() {
    const plans = await getMembershipPlans();
    const options = ['<option value="">Select plan…</option>'];
    plans.forEach(plan => {
      options.push(`<option value="${plan.id}">${plan.planName} - ${plan.durationMonths} mo - INR ${plan.price}</option>`);
    });
    planSelect.innerHTML = options.join('');
  }

  async function loadMemberOptions() {
    const members = await searchUsers({ role: 'MEMBER', limit: 50 });
    const options = ['<option value="">Select member…</option>'];
    members.forEach(member => {
      options.push(`<option value="${member.id}">${member.name} (${member.email})</option>`);
    });
    memberSelect.innerHTML = options.join('');
    lookupMemberSelect.innerHTML = options.join('');
  }

  document.getElementById('enrollForm').addEventListener('submit', async e => {
    e.preventDefault();
    try {
      const planId = +planSelect.value;
      if (!planId) return toast('Select a plan', 'err');
      const data = isMember
        ? await purchaseMyMembership({
            planId,
            paymentMode: document.getElementById('membershipPaymentMode').value,
          })
        : await enrollMembership({
            memberId: +memberSelect.value,
            planId,
          });
      toast(isMember
        ? `Membership bought (ID: ${data.membership.id}), payment request created (ID: ${data.payment.id})`
        : `Enrolled! Membership ID: ${data.id}`);
      e.target.reset();
    } catch (err) { toast(err.message, 'err'); }
  });

  document.getElementById('lookupBtn').addEventListener('click', async () => {
    const id = lookupMemberSelect.value;
    if (!isMember && !id) return toast('Select a member', 'err');
    try {
      const d = isMember ? await getMyMembership() : await getMembership(id);
      const info = document.getElementById('membershipInfo');
      const empty = document.getElementById('membershipEmpty');
      if (!d) { info.style.display = 'none'; empty.style.display = ''; return; }
      document.getElementById('membershipBody').innerHTML = Object.entries(d)
        .map(([k, v]) => `<tr><td><strong>${k}</strong></td><td>${formatMembershipValue(k, v)}</td></tr>`).join('');
      info.style.display = '';
      empty.style.display = 'none';
    } catch (err) {
      const info = document.getElementById('membershipInfo');
      const empty = document.getElementById('membershipEmpty');
      info.style.display = 'none';

      const isNotFound = /No active membership found|not found/i.test(err.message || '');
      if (isNotFound) {
        empty.style.display = '';
      } else {
        empty.style.display = 'none';
        toast(err.message || 'Unable to load membership right now.', 'err');
      }
    }
  });

  function formatMembershipValue(key, value) {
    if (value == null) return '—';

    if (key === 'member' && typeof value === 'object') {
      const memberName = value.name || 'Unknown';
      const memberId = value.id != null ? `#${value.id}` : '—';
      const memberEmail = value.email || '—';
      return `${memberName} (${memberId}, ${memberEmail})`;
    }

    if (key === 'plan' && typeof value === 'object') {
      const planName = value.planName || 'Unknown';
      const planId = value.id != null ? `#${value.id}` : '—';
      const planPrice = value.price != null ? `₹${value.price}` : '—';
      const planDuration = value.durationMonths != null ? `${value.durationMonths} months` : '—';
      return `${planName} (${planId}, ${planPrice}, ${planDuration})`;
    }

    if (typeof value === 'object') {
      return `<pre style="font-size:0.8rem;white-space:pre-wrap;">${JSON.stringify(value, null, 2)}</pre>`;
    }

    return String(value);
  }

  if (session.role === 'MEMBER') {
    const lookupGroup = lookupMemberSelect.closest('.form-group');
    if (lookupGroup) lookupGroup.style.display = 'none';
    document.getElementById('lookupBtn').textContent = 'Load My Membership';
    document.getElementById('lookupBtn').click();
  }

  (async function initSelectors() {
    try {
      await loadPlanOptions();
      if (!isMember) {
        await loadMemberOptions();
      }
    } catch (err) {
      toast(err.message || 'Unable to load selector data', 'err');
    }
  })();
</script>
</body>
</html>
