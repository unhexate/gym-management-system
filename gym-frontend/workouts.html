<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Workouts – GymMS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<nav></nav>

<div class="page">
  <h1>Workouts</h1>

  <!-- Create plan -->
  <div class="card" id="createWorkoutCard">
    <h2>Create Workout Plan</h2>
    <form id="workoutForm">
      <div class="form-grid">
        <div class="form-group">
          <label for="trainerSelect">Trainer</label>
          <select id="trainerSelect" required>
            <option value="">Select trainer…</option>
          </select>
        </div>
        <div class="form-group">
          <label for="memberSelect">Member</label>
          <select id="memberSelect" required>
            <option value="">Select member…</option>
          </select>
        </div>
        <div class="form-group full">
          <label for="exercises">Exercises</label>
          <textarea id="exercises" placeholder="e.g. Squats 3×10, Bench press 3×8, Deadlift 3×5" required></textarea>
        </div>
        <div class="form-group">
          <label for="schedule">Schedule</label>
          <input id="schedule" type="text" placeholder="Mon / Wed / Fri" required />
        </div>
        <div class="form-group">
          <label for="difficulty">Difficulty</label>
          <select id="difficulty" required>
            <option value="">Select…</option>
            <option value="BEGINNER">Beginner</option>
            <option value="INTERMEDIATE">Intermediate</option>
            <option value="ADVANCED">Advanced</option>
          </select>
        </div>
      </div>
      <br />
      <button type="submit" class="btn btn-primary">Create Plan</button>
    </form>
  </div>

  <!-- View plan -->
  <div class="card">
    <h2>View Member's Workout Plan</h2>
    <div class="row">
      <div class="form-group" style="flex:1;min-width:140px;">
        <label for="lookupMemberSelect">Member</label>
        <select id="lookupMemberSelect">
          <option value="">Select member…</option>
        </select>
      </div>
      <button id="lookupBtn" class="btn btn-secondary">Look Up</button>
    </div>
    <br />
    <div id="planCard" style="display:none;">
      <table>
        <thead><tr><th>Field</th><th>Value</th></tr></thead>
        <tbody id="planBody"></tbody>
      </table>
    </div>
    <p id="planEmpty" class="empty" style="display:none;">No workout plan found for this member.</p>
  </div>
</div>

<div id="toast"></div>
<script src="auth.js"></script>
<script src="api.js"></script>
<script>
  const session = requireRole(['ADMIN', 'TRAINER', 'MEMBER']);
  if (!session) throw new Error('redirect');
  const trainerSelect = document.getElementById('trainerSelect');
  const memberSelect = document.getElementById('memberSelect');
  const lookupMemberSelect = document.getElementById('lookupMemberSelect');

  const canCreateWorkout = hasAnyRole(['ADMIN', 'TRAINER']);
  document.getElementById('createWorkoutCard').style.display = canCreateWorkout ? '' : 'none';

  async function initSelectors() {
    if (session.role === 'MEMBER') {
      return;
    }

    const members = session.role === 'TRAINER'
      ? await getMyManageableMembers()
      : await searchUsers({ role: 'MEMBER', limit: 50 });
    const memberOptions = ['<option value="">Select member…</option>'];
    members.forEach(member => {
      memberOptions.push(`<option value="${member.id}">${member.name} (${member.email})</option>`);
    });

    memberSelect.innerHTML = memberOptions.join('');
    lookupMemberSelect.innerHTML = memberOptions.join('');

    if (session.role === 'TRAINER') {
      trainerSelect.innerHTML = `<option value="${session.id}">${session.name || session.email}</option>`;
      trainerSelect.value = String(session.id);
      trainerSelect.disabled = true;
      return;
    }

    const trainers = await searchUsers({ role: 'TRAINER', limit: 50 });
    const trainerOptions = ['<option value="">Select trainer…</option>'];
    trainers.forEach(trainer => {
      trainerOptions.push(`<option value="${trainer.id}">${trainer.name} (${trainer.email})</option>`);
    });
    trainerSelect.innerHTML = trainerOptions.join('');
  }

  const difficultyBadge = { BEGINNER: 'badge-green', INTERMEDIATE: 'badge-yellow', ADVANCED: 'badge-red' };

  document.getElementById('workoutForm').addEventListener('submit', async e => {
    e.preventDefault();
    try {
      const data = await createWorkout({
        trainerId:       +trainerSelect.value,
        memberId:        +memberSelect.value,
        exercises:        document.getElementById('exercises').value,
        schedule:         document.getElementById('schedule').value,
        difficultyLevel:  document.getElementById('difficulty').value,
      });
      toast(`Workout plan created (ID: ${data.id})`);
      e.target.reset();
    } catch (err) { toast(err.message, 'err'); }
  });

  document.getElementById('lookupBtn').addEventListener('click', async () => {
    const isMember = session.role === 'MEMBER';
    const id = lookupMemberSelect.value;
    if (!isMember && !id) return toast('Select a member', 'err');
    try {
      const d = isMember ? await getMyWorkout() : await getWorkout(id);
      const planCard  = document.getElementById('planCard');
      const planEmpty = document.getElementById('planEmpty');
      if (!d) { planCard.style.display = 'none'; planEmpty.style.display = ''; return; }
      document.getElementById('planBody').innerHTML = Object.entries(d).map(([k, v]) => {
        const display = k === 'difficultyLevel'
          ? `<span class="badge ${difficultyBadge[v] || 'badge-blue'}">${v}</span>`
          : (v ?? '—');
        return `<tr><td><strong>${k}</strong></td><td>${display}</td></tr>`;
      }).join('');
      planCard.style.display = '';
      planEmpty.style.display = 'none';
    } catch (err) {
      document.getElementById('planCard').style.display = 'none';
      document.getElementById('planEmpty').style.display = '';
      toast(err.message, 'err');
    }
  });

  if (session.role === 'MEMBER') {
    const lookupGroup = lookupMemberSelect.closest('.form-group');
    if (lookupGroup) lookupGroup.style.display = 'none';
    document.getElementById('lookupBtn').textContent = 'Load My Plan';
    document.getElementById('lookupBtn').click();
  }

  initSelectors().catch(err => {
    toast(err.message || 'Unable to load workout selectors', 'err');
  });
</script>
</body>
</html>
