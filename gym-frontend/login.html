<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In – GymMS</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-box { width: 100%; max-width: 420px; }
    .login-box h1 { text-align: center; margin-bottom: 0.25rem; }
    .login-box .subtitle { text-align: center; color: #64748b; font-size: 0.9rem; margin-bottom: 1.5rem; }
    .error-msg { color: #ef4444; font-size: 0.875rem; margin-top: 0.75rem; display: none; }
    .tabs { display: flex; border-bottom: 2px solid #e2e8f0; margin-bottom: 1.5rem; }
    .tab-btn { flex: 1; padding: 0.6rem; background: none; border: none; border-bottom: 2px solid transparent;
               margin-bottom: -2px; font-size: 0.9rem; font-weight: 600; color: #64748b; cursor: pointer; transition: color 0.15s, border-color 0.15s; }
    .tab-btn.active { color: #6366f1; border-bottom-color: #6366f1; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
  </style>
</head>
<body>

<div class="login-box">
  <h1>🏋️ GymMS</h1>
  <p class="subtitle">Welcome</p>

  <div class="card">
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('login')">Sign In</button>
      <button class="tab-btn" onclick="switchTab('register')">Register</button>
    </div>

    <!-- ── Sign In ── -->
    <div class="tab-panel active" id="tab-login">
      <form id="loginForm">
        <div class="form-group" style="margin-bottom:1rem;">
          <label for="email">Email</label>
          <input id="email" type="email" placeholder="you@example.com" required autofocus />
        </div>
        <div class="form-group" style="margin-bottom:1.25rem;">
          <label for="password">Password</label>
          <input id="password" type="password" placeholder="••••••••" required />
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;" id="loginBtn">Sign In</button>
        <p class="error-msg" id="loginError"></p>
      </form>
    </div>

    <!-- ── Register ── -->
    <div class="tab-panel" id="tab-register">
      <form id="registerForm">
        <div class="form-grid">
          <div class="form-group">
            <label for="regName">Name</label>
            <input id="regName" type="text" placeholder="Jane Doe" required />
          </div>
          <div class="form-group">
            <label for="regEmail">Email</label>
            <input id="regEmail" type="email" placeholder="jane@example.com" required />
          </div>
          <div class="form-group">
            <label for="regPhone">Phone</label>
            <input id="regPhone" type="text" placeholder="+1 555 0100" required />
          </div>
          <div class="form-group">
            <label for="regPassword">Password</label>
            <input id="regPassword" type="password" placeholder="••••••••" required />
          </div>
        </div>
        <br />
        <button type="submit" class="btn btn-success" style="width:100%;" id="registerBtn">Create Account</button>
        <p class="error-msg" id="registerError"></p>
      </form>
    </div>
  </div>
</div>

<div id="toast"></div>
<script src="auth.js"></script>
<script>
  // If a stored session is still valid, skip the login page.
  (async function () {
    const s = getSession();
    if (!s) return;
    const valid = await validateSession();
    if (valid) location.replace('index.html');
  })();

  function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach((b, i) =>
      b.classList.toggle('active', (i === 0) === (tab === 'login')));
    document.getElementById('tab-login').classList.toggle('active', tab === 'login');
    document.getElementById('tab-register').classList.toggle('active', tab === 'register');
  }

  // ── Sign In ──────────────────────────────────────────
  document.getElementById('loginForm').addEventListener('submit', async e => {
    e.preventDefault();
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn      = document.getElementById('loginBtn');
    const errEl    = document.getElementById('loginError');

    btn.disabled = true;
    btn.textContent = 'Signing in…';
    errEl.style.display = 'none';

    try {
      const res = await fetch('http://localhost:8080/api/users/me', {
        headers: { 'Authorization': 'Basic ' + btoa(email + ':' + password) },
      });
      if (res.status === 401 || res.status === 403) throw new Error('Invalid email or password.');
      if (!res.ok) throw new Error('Server error. Please try again.');
      const user = (await res.json()).data;
      setSession({ email, password, role: user.role, name: user.name, id: user.id });
      location.replace('index.html');
    } catch (err) {
      errEl.textContent = err.message;
      errEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }
  });

  // ── Register ─────────────────────────────────────────
  document.getElementById('registerForm').addEventListener('submit', async e => {
    e.preventDefault();
    const name     = document.getElementById('regName').value.trim();
    const email    = document.getElementById('regEmail').value.trim();
    const phone    = document.getElementById('regPhone').value.trim();
    const password = document.getElementById('regPassword').value;
    const btn      = document.getElementById('registerBtn');
    const errEl    = document.getElementById('registerError');

    btn.disabled = true;
    btn.textContent = 'Creating account…';
    errEl.style.display = 'none';

    try {
      const res = await fetch('http://localhost:8080/api/users', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email, phone, password, role: 'MEMBER' }),
      });
      const json = await res.json();
      if (!res.ok) throw new Error(json.message || 'Registration failed.');

      // Auto sign-in after registration
      setSession({ email, password, role: 'MEMBER', name: json.data.name, id: json.data.id });
      location.replace('index.html');
    } catch (err) {
      errEl.textContent = err.message;
      errEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Create Account';
    }
  });
</script>
</body>
</html>
